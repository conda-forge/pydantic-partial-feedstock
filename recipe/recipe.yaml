schema_version: 1

context:
  version: "0.10.2"
  python_check_max: "3.14"

package:
  name: pydantic-partial
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/p/pydantic-partial/pydantic_partial-${{ version }}.tar.gz
    sha256: 8dbfc9843c8ca854c56c368a276e2a61d9f65beefd1deee5c4dd8ed7d74435fd
    target_directory: dist
  - url: https://github.com/team23/pydantic-partial/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 82644a8553683507607f73f65b2c9cc219d5dcd8c97b945c2ea1c3fa5df85ddb
    target_directory: src

build:
  number: 0
  noarch: python
  script:
    - cd dist
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - uv-build >=0.8.22,<0.11.0
    - python ${{ python_min }}.*
  run:
    - pydantic >=2.0.0,<3.0.0
    - python >=${{ python_min }}

tests:
  - python:
      imports: pydantic_partial
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - files:
      source:
        - src/tests/
    requirements:
      run:
        - coverage
        - fastapi
        - pytest
        - python ${{ python_min }}.*
        - trio
    script:
      - coverage run --source=pydantic_partial --branch -m pytest -vv --color=yes --tb=long
      - coverage report --show-missing --skip-covered --fail-under=94

about:
  summary: Create partial models from your pydantic models. Partial models may allow None for certain or all fields.
  license: MIT
  license_file: dist/LICENSE
  homepage: https://pypi.org/project/pydantic-partial
  repository: https://github.com/team23/pydantic-partial

extra:
  recipe-maintainers:
    - bollwyvl
